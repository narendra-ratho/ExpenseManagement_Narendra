<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Expense Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2433;
    --border: #2a3045;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #e8eaf0;
    --text-muted: #7a849a;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 0%, rgba(108,99,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 100%, rgba(255,101,132,0.09) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap; gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 20px rgba(108,99,255,0.4);
  }
  .logo h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .logo span { color: var(--accent); }
  .logo p { font-size: 12px; color: var(--text-muted); }
  .month-filter {
    display: flex; gap: 8px; align-items: center;
  }
  .month-filter select, .month-filter input {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer;
    outline: none;
  }

  /* Stats row */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative; overflow: hidden;
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-3px); }
  .stat-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .stat-card.total::after { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .stat-card.today::after { background: linear-gradient(90deg, var(--accent3), #00c9ff); }
  .stat-card.txn::after { background: linear-gradient(90deg, #f7971e, #ffd200); }
  .stat-card.top::after { background: linear-gradient(90deg, var(--accent2), #f953c6); }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* Two-col layout */
  .main-grid { display: grid; grid-template-columns: 1fr 360px; gap: 20px; }
  @media(max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }

  /* Card */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
  }
  .card-title .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: inline-block;
  }

  /* Add Expense Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media(max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .field input, .field select, .field textarea {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 70px; }
  .field.full { grid-column: span 2; }
  @media(max-width: 500px) { .field.full { grid-column: span 1; } }

  .btn {
    padding: 11px 22px; border-radius: 10px; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b80ff);
    color: #fff;
    box-shadow: 0 4px 15px rgba(108,99,255,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,0.5); }
  .btn-success { background: linear-gradient(135deg, var(--accent3), #00c9ff); color: #0d0f14; }
  .btn-danger { background: rgba(255,101,132,0.15); color: var(--accent2); border: 1px solid rgba(255,101,132,0.3); }
  .btn-danger:hover { background: rgba(255,101,132,0.3); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* Category chips */
  .cat-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .chip {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
    border: 1.5px solid transparent; transition: all 0.2s; user-select: none;
    font-weight: 500;
  }
  .chip.active { border-color: var(--accent); background: rgba(108,99,255,0.15); color: var(--accent); }

  /* Transactions list */
  .txn-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
    transition: background 0.2s; border-radius: 8px;
  }
  .txn-item:last-child { border-bottom: none; }
  .txn-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .txn-info { flex: 1; min-width: 0; }
  .txn-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .txn-amount { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--accent2); flex-shrink: 0; }
  .txn-del { opacity: 0; transition: opacity 0.2s; }
  .txn-item:hover .txn-del { opacity: 1; }

  /* Chart container */
  .chart-wrap { position: relative; height: 220px; }

  /* Category breakdown bars */
  .cat-bar-item { margin-bottom: 14px; }
  .cat-bar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .cat-bar-header .cat-name { display: flex; align-items: center; gap: 6px; }
  .cat-bar-bg { background: var(--surface2); border-radius: 20px; height: 7px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 20px; transition: width 0.6s ease; }

  /* Budget tracker */
  .budget-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .budget-item:last-child { border-bottom: none; }
  .budget-amount { font-weight: 600; font-family: 'Syne', sans-serif; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--accent);
    color: var(--text); padding: 12px 20px; border-radius: 12px;
    font-size: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transform: translateY(80px); opacity: 0;
    transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Report modal overlay */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; max-width: 500px; width: 90%;
    max-height: 80vh; overflow-y: auto;
    transform: scale(0.95); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal h2 { font-family: 'Syne', sans-serif; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--text-muted); padding: 6px 8px; border-bottom: 1px solid var(--border); }
  td { padding: 8px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  tr:last-child td { border-bottom: none; }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text-muted);
    font-size: 14px;
  }
  .empty-state .em { font-size: 36px; display: block; margin-bottom: 10px; }

  .tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 16px; }
  .tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; color: var(--text-muted); }
  .tab.active { background: var(--surface); color: var(--text); font-weight: 600; }

  .flex-end { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
  .text-success { color: var(--accent3); }
  .text-danger { color: var(--accent2); }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">💰</div>
      <div>
        <h1>Expense<span>Track</span></h1>
        <p>Student Money Manager</p>
      </div>
    </div>
    <div class="month-filter">
      <select id="filterMonth">
        <option value="">All Months</option>
        <option value="01">January</option><option value="02">February</option>
        <option value="03">March</option><option value="04">April</option>
        <option value="05">May</option><option value="06">June</option>
        <option value="07">July</option><option value="08">August</option>
        <option value="09">September</option><option value="10">October</option>
        <option value="11">November</option><option value="12">December</option>
      </select>
      <input type="number" id="filterYear" placeholder="Year" value="2025" style="width:80px">
      <button class="btn btn-success btn-sm" onclick="openReport()">📊 Report</button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card total">
      <div class="stat-label">Total Spent</div>
      <div class="stat-value" id="totalSpent">₹0</div>
      <div class="stat-sub" id="totalPeriod">All time</div>
    </div>
    <div class="stat-card today">
      <div class="stat-label">Today</div>
      <div class="stat-value" id="todaySpent">₹0</div>
      <div class="stat-sub" id="todayDate">-</div>
    </div>
    <div class="stat-card txn">
      <div class="stat-label">Transactions</div>
      <div class="stat-value" id="txnCount">0</div>
      <div class="stat-sub">records</div>
    </div>
    <div class="stat-card top">
      <div class="stat-label">Top Category</div>
      <div class="stat-value" id="topCat" style="font-size:18px">—</div>
      <div class="stat-sub" id="topCatAmt">₹0</div>
    </div>
  </div>

  <div class="main-grid">
    <div>
      <!-- Add Expense -->
      <div class="card">
        <div class="card-title"><span class="dot"></span>Add Expense</div>
        <div class="form-grid">
          <div class="field">
            <label>Amount (₹)</label>
            <input type="number" id="amount" placeholder="e.g. 50" min="0" step="0.01">
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="date">
          </div>
          <div class="field">
            <label>Category</label>
            <select id="category">
              <option value="">Select category</option>
            </select>
          </div>
          <div class="field">
            <label>Note (optional)</label>
            <input type="text" id="note" placeholder="e.g. Lunch at canteen">
          </div>
        </div>
        <div style="margin-top: 14px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="addExpense()">➕ Add Expense</button>
          <button class="btn btn-danger btn-sm" onclick="clearAll()">🗑 Clear All</button>
        </div>
      </div>

      <!-- Transactions -->
      <div class="card">
        <div class="card-title"><span class="dot"></span>Transactions</div>

        <!-- Filter chips -->
        <div class="cat-chips" id="filterChips"></div>

        <div id="txnList"></div>
      </div>
    </div>

    <div>
      <!-- Donut chart -->
      <div class="card">
        <div class="card-title"><span class="dot"></span>Spending by Category</div>
        <div class="chart-wrap">
          <canvas id="donutChart"></canvas>
        </div>
      </div>

      <!-- Category bars -->
      <div class="card">
        <div class="card-title"><span class="dot"></span>Breakdown</div>
        <div id="catBars"></div>
      </div>

      <!-- Budget -->
      <div class="card">
        <div class="card-title"><span class="dot"></span>Monthly Budget</div>
        <div class="field" style="margin-bottom:12px;">
          <label>Set Monthly Budget (₹)</label>
          <input type="number" id="budgetInput" placeholder="e.g. 5000" oninput="saveBudget()">
        </div>
        <div id="budgetSummary"></div>
      </div>
    </div>
  </div>
</div>

<!-- Report Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeReport(event)">
  <div class="modal" id="reportModal">
    <h2>📊 Expense Report</h2>
    <div id="reportContent"></div>
    <div class="flex-end">
      <button class="btn btn-primary" onclick="downloadReport()">⬇ Download CSV</button>
      <button class="btn btn-danger" onclick="closeReport()">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
  { name: 'Tea/Coffee', icon: '☕', color: '#c8956c' },
  { name: 'Food', icon: '🍱', color: '#ff6584' },
  { name: 'Mess', icon: '🍽️', color: '#f7971e' },
  { name: 'Hostel', icon: '🏠', color: '#6c63ff' },
  { name: 'College Fee', icon: '🏫', color: '#43e97b' },
  { name: 'Education', icon: '📚', color: '#00c9ff' },
  { name: 'Stationery', icon: '✏️', color: '#a29bfe' },
  { name: 'Clothing', icon: '👕', color: '#fd79a8' },
  { name: 'Medical', icon: '💊', color: '#e17055' },
  { name: 'Transport', icon: '🚌', color: '#55efc4' },
  { name: 'Entertainment', icon: '🎮', color: '#fdcb6e' },
  { name: 'Mobile/Internet', icon: '📱', color: '#74b9ff' },
  { name: 'Other', icon: '💼', color: '#b2bec3' },
];

let expenses = JSON.parse(localStorage.getItem('expenses_v2') || '[]');
let budget = parseFloat(localStorage.getItem('budget_v2') || '0');
let filterCat = 'All';
let donutChart = null;

function saveExpenses() { localStorage.setItem('expenses_v2', JSON.stringify(expenses)); }
function saveBudget() {
  budget = parseFloat(document.getElementById('budgetInput').value) || 0;
  localStorage.setItem('budget_v2', budget);
  renderBudget();
}

function init() {
  // Populate category select
  const sel = document.getElementById('category');
  CATEGORIES.forEach(c => {
    const o = document.createElement('option');
    o.value = c.name; o.textContent = `${c.icon} ${c.name}`;
    sel.appendChild(o);
  });

  // Set today's date
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  document.getElementById('budgetInput').value = budget || '';
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-IN', {day:'numeric',month:'short'});

  // Init chart
  const ctx = document.getElementById('donutChart').getContext('2d');
  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [], backgroundColor: [], borderWidth: 0, hoverOffset: 8 }] },
    options: {
      cutout: '68%', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: '#7a849a', font: { size: 11, family: 'DM Sans' }, boxWidth: 10, padding: 14 } } }
    }
  });

  renderAll();
  filterMonth();
}

function getFilteredExpenses() {
  const mo = document.getElementById('filterMonth').value;
  const yr = document.getElementById('filterYear').value;
  let list = expenses;
  if (mo && yr) list = list.filter(e => e.date.startsWith(`${yr}-${mo}`));
  else if (yr && !mo) list = list.filter(e => e.date.startsWith(yr));
  if (filterCat !== 'All') list = list.filter(e => e.category === filterCat);
  return list;
}

function filterMonth() { renderAll(); }
document.getElementById('filterMonth').addEventListener('change', filterMonth);
document.getElementById('filterYear').addEventListener('input', filterMonth);

function renderAll() {
  const list = getFilteredExpenses();
  renderStats(list);
  renderFilterChips();
  renderTxnList(list);
  renderChart(list);
  renderCatBars(list);
  renderBudget();
}

function renderStats(list) {
  const total = list.reduce((s, e) => s + e.amount, 0);
  document.getElementById('totalSpent').textContent = '₹' + fmt(total);

  const today = new Date().toISOString().split('T')[0];
  const todayAmt = list.filter(e => e.date === today).reduce((s,e) => s+e.amount, 0);
  document.getElementById('todaySpent').textContent = '₹' + fmt(todayAmt);
  document.getElementById('txnCount').textContent = list.length;

  // Top category
  const catTotals = {};
  list.forEach(e => catTotals[e.category] = (catTotals[e.category]||0) + e.amount);
  const topCat = Object.entries(catTotals).sort((a,b) => b[1]-a[1])[0];
  if (topCat) {
    const c = CATEGORIES.find(x => x.name === topCat[0]);
    document.getElementById('topCat').textContent = (c?.icon||'') + ' ' + topCat[0];
    document.getElementById('topCatAmt').textContent = '₹' + fmt(topCat[1]);
  } else {
    document.getElementById('topCat').textContent = '—';
    document.getElementById('topCatAmt').textContent = '₹0';
  }
}

function renderFilterChips() {
  const el = document.getElementById('filterChips');
  const cats = ['All', ...CATEGORIES.map(c => c.name)];
  el.innerHTML = cats.map(c => `
    <div class="chip ${filterCat===c?'active':''}" onclick="setCatFilter('${c}')">${c==='All'?'🔍 All':''} ${c}</div>
  `).join('');
}

function setCatFilter(c) { filterCat = c; renderAll(); }

function renderTxnList(list) {
  const el = document.getElementById('txnList');
  const sorted = [...list].sort((a,b) => new Date(b.date)-new Date(a.date));
  if (!sorted.length) {
    el.innerHTML = `<div class="empty-state"><span class="em">📭</span>No transactions yet. Add your first expense!</div>`;
    return;
  }
  el.innerHTML = sorted.map(e => {
    const cat = CATEGORIES.find(c => c.name === e.category) || { icon:'💼', color:'#b2bec3' };
    return `
    <div class="txn-item">
      <div class="txn-icon" style="background:${cat.color}22;">${cat.icon}</div>
      <div class="txn-info">
        <div class="txn-title">${e.note || e.category}</div>
        <div class="txn-meta">${e.category} · ${formatDate(e.date)}</div>
      </div>
      <div class="txn-amount">₹${fmt(e.amount)}</div>
      <button class="btn btn-danger btn-sm txn-del" onclick="deleteExp('${e.id}')">✕</button>
    </div>`;
  }).join('');
}

function renderChart(list) {
  const catTotals = {};
  list.forEach(e => catTotals[e.category] = (catTotals[e.category]||0) + e.amount);
  const entries = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
  donutChart.data.labels = entries.map(([k]) => { const c = CATEGORIES.find(x=>x.name===k); return `${c?.icon||''} ${k}`; });
  donutChart.data.datasets[0].data = entries.map(([,v]) => v);
  donutChart.data.datasets[0].backgroundColor = entries.map(([k]) => CATEGORIES.find(x=>x.name===k)?.color || '#888');
  donutChart.update();
}

function renderCatBars(list) {
  const catTotals = {};
  list.forEach(e => catTotals[e.category] = (catTotals[e.category]||0) + e.amount);
  const entries = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
  const max = entries[0]?.[1] || 1;
  const total = entries.reduce((s,[,v])=>s+v, 0);
  const el = document.getElementById('catBars');
  if (!entries.length) { el.innerHTML = '<div class="empty-state" style="padding:20px">No data</div>'; return; }
  el.innerHTML = entries.map(([k,v]) => {
    const cat = CATEGORIES.find(c=>c.name===k) || {icon:'💼',color:'#888'};
    const pct = Math.round(v/total*100);
    return `
    <div class="cat-bar-item">
      <div class="cat-bar-header">
        <div class="cat-name">${cat.icon} <span>${k}</span></div>
        <div><strong>₹${fmt(v)}</strong> <span style="color:var(--text-muted);font-size:11px">(${pct}%)</span></div>
      </div>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${v/max*100}%;background:${cat.color}"></div></div>
    </div>`;
  }).join('');
}

function renderBudget() {
  const mo = document.getElementById('filterMonth').value || (new Date().getMonth()+1+'').padStart(2,'0');
  const yr = document.getElementById('filterYear').value || new Date().getFullYear();
  const monthExpenses = expenses.filter(e => e.date.startsWith(`${yr}-${mo}`));
  const spent = monthExpenses.reduce((s,e)=>s+e.amount, 0);
  const el = document.getElementById('budgetSummary');
  if (!budget) { el.innerHTML = '<div style="color:var(--text-muted);font-size:13px">Set a monthly budget above to track progress.</div>'; return; }
  const remaining = budget - spent;
  const pct = Math.min(100, Math.round(spent/budget*100));
  const color = pct < 70 ? '#43e97b' : pct < 90 ? '#f7971e' : '#ff6584';
  el.innerHTML = `
    <div class="cat-bar-bg" style="height:10px;margin-bottom:10px"><div class="cat-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="budget-item"><span>Budget</span><span class="budget-amount">₹${fmt(budget)}</span></div>
    <div class="budget-item"><span>Spent</span><span class="budget-amount text-danger">₹${fmt(spent)}</span></div>
    <div class="budget-item"><span>Remaining</span><span class="budget-amount ${remaining>=0?'text-success':'text-danger'}">₹${fmt(Math.abs(remaining))} ${remaining<0?'over':''}</span></div>
    <div class="budget-item"><span>Used</span><span class="budget-amount">${pct}%</span></div>
  `;
}

function addExpense() {
  const amount = parseFloat(document.getElementById('amount').value);
  const date = document.getElementById('date').value;
  const category = document.getElementById('category').value;
  const note = document.getElementById('note').value.trim();
  if (!amount || amount <= 0) return showToast('⚠️ Enter a valid amount');
  if (!date) return showToast('⚠️ Select a date');
  if (!category) return showToast('⚠️ Select a category');
  const expense = { id: Date.now()+'', amount, date, category, note };
  expenses.push(expense);
  saveExpenses();
  document.getElementById('amount').value = '';
  document.getElementById('note').value = '';
  renderAll();
  showToast('✅ Expense added!');
}

function deleteExp(id) {
  expenses = expenses.filter(e => e.id !== id);
  saveExpenses();
  renderAll();
  showToast('🗑 Deleted');
}

function clearAll() {
  if (!confirm('Delete ALL expenses? This cannot be undone.')) return;
  expenses = [];
  saveExpenses();
  renderAll();
  showToast('🗑 All cleared');
}

function openReport() {
  const list = getFilteredExpenses();
  const total = list.reduce((s,e)=>s+e.amount,0);
  const catTotals = {};
  list.forEach(e => catTotals[e.category]=(catTotals[e.category]||0)+e.amount);
  const mo = document.getElementById('filterMonth');
  const yr = document.getElementById('filterYear').value;
  const periodLabel = mo.value ? `${mo.options[mo.selectedIndex]?.text} ${yr}` : `All time`;

  let html = `<p style="color:var(--text-muted);font-size:13px;margin-bottom:16px">Period: <strong style="color:var(--text)">${periodLabel}</strong> · Total: <strong style="color:var(--accent2)">₹${fmt(total)}</strong></p>`;
  html += `<h3 style="font-size:14px;margin-bottom:10px;font-family:Syne">Category Summary</h3>`;
  html += `<table><thead><tr><th>Category</th><th>Amount</th><th>%</th></tr></thead><tbody>`;
  Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).forEach(([k,v]) => {
    const c = CATEGORIES.find(x=>x.name===k);
    html += `<tr><td>${c?.icon||''} ${k}</td><td>₹${fmt(v)}</td><td>${Math.round(v/total*100)}%</td></tr>`;
  });
  html += `</tbody></table>`;
  html += `<h3 style="font-size:14px;margin:18px 0 10px;font-family:Syne">All Transactions</h3>`;
  html += `<table><thead><tr><th>Date</th><th>Category</th><th>Note</th><th>Amount</th></tr></thead><tbody>`;
  [...list].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(e => {
    html += `<tr><td>${formatDate(e.date)}</td><td>${e.category}</td><td>${e.note||'-'}</td><td>₹${fmt(e.amount)}</td></tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('reportContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeReport(e) {
  if (!e || e.target.id === 'modalOverlay' || e.target.classList.contains('btn-danger')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function downloadReport() {
  const list = getFilteredExpenses();
  let csv = 'Date,Category,Note,Amount (INR)\n';
  [...list].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(e => {
    csv += `${e.date},"${e.category}","${e.note||''}",${e.amount}\n`;
  });
  // Summary section
  const catTotals = {};
  list.forEach(e => catTotals[e.category]=(catTotals[e.category]||0)+e.amount);
  csv += '\nCategory Summary\nCategory,Total\n';
  Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).forEach(([k,v]) => { csv += `"${k}",${v}\n`; });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `expense_report_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  showToast('📥 Report downloaded!');
}

function fmt(n) {
  if (n === undefined || n === null || isNaN(n)) return '0';
  return n.toLocaleString('en-IN', {minimumFractionDigits: 0, maximumFractionDigits: 2});
}

function formatDate(d) {
  if (!d) return '-';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
